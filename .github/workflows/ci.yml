name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quick-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: '3.18'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config
        # Try to install fmt library if available
        sudo apt-get install -y libfmt-dev || echo "fmt library not available, continuing without it"
        
    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug
        
    - name: Build (continue on error for now)
      run: |
        cmake --build build -j || echo "Build had issues - this is expected as the project is being ported to Unix platforms"
        
    - name: Check if any executables were built
      run: |
        echo "Checking for any built executables..."
        find build -name "*AssetBundle*" -type f || echo "No AssetBundleExtractor found"
        find build -name "*.so" -o -name "*.a" | head -10 || echo "No libraries found"
        echo "CI completed - main goal is to ensure CMake configuration works"